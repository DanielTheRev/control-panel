<app-page-layout>
  <app-page-header title="Hero Sliders" subtitle="Gestiona el carrusel principal del inicio">
    <div actions>
      <a routerLink="create" class="btn btn-primary">
        <mat-icon>add</mat-icon>
        Nuevo Slide
      </a>
    </div>
  </app-page-header>

  <div class="card bg-base-100 shadow-sm border border-base-300 mt-6">
    <div class="overflow-x-auto">
      <table mat-table [dataSource]="state().data" class="w-full">

        <!-- Image Column -->
        <ng-container matColumnDef="image">
          <th mat-header-cell *matHeaderCellDef> Imagen </th>
          <td mat-cell *matCellDef="let slide">
            <div class="avatar my-2">
              <div class="w-24 h-12 rounded bg-base-200">
                <img [src]="slide.imageDesktop" [alt]="slide.title" class="object-cover" />
              </div>
            </div>
          </td>
        </ng-container>

        <!-- Title Column -->
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef> Título </th>
          <td mat-cell *matCellDef="let slide">
            <div class="font-bold">{{ slide.title }}</div>
            <div class="text-xs text-base-content/50">{{ slide.link }}</div>
          </td>
        </ng-container>

        <!-- Order Column -->
        <ng-container matColumnDef="order">
          <th mat-header-cell *matHeaderCellDef> Orden </th>
          <td mat-cell *matCellDef="let slide"> {{ slide.order }} </td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Estado </th>
          <td mat-cell *matCellDef="let slide">
            <span class="badge" [class.badge-success]="slide.isActive" [class.badge-ghost]="!slide.isActive">
              {{ slide.isActive ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="text-right"> Acciones </th>
          <td mat-cell *matCellDef="let slide" class="text-right">
            <a [routerLink]="['edit', slide._id]" class="btn btn-sm btn-ghost btn-circle">
              <mat-icon class="text-base-content/50">edit</mat-icon>
            </a>
            <button (click)="deleteSlide(slide._id!)" class="btn btn-sm btn-ghost btn-circle text-error">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      @if (state().data.length === 0) {
      <div class="p-8 text-center text-base-content/50">
        <mat-icon class="text-4xl mb-2 opacity-50">imagesmode</mat-icon>
        <p>No hay slides configurados.</p>
      </div>
      }
    </div>
  </div>
</app-page-layout>
