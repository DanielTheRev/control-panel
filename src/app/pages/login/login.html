<section class="bg-base-200 h-full w-full">
  <div class="flex flex-col items-center justify-center mx-auto w-full h-full">
    <a
      href="#"
      class="flex items-center mb-6 text-2xl font-semibold text-base-content"
    >
      <div class="w-9 h-9 rounded-full bg-primary flex items-center justify-center mr-3 shadow-md">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-primary-content" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      Electromix - Admin
    </a>
    <div
      class="w-full bg-base-100 rounded-2xl shadow-lg border border-base-300 md:mt-0 sm:max-w-md xl:p-0"
    >
      <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
        <h1
          class="text-xl font-bold leading-tight tracking-tight text-base-content md:text-2xl"
        >
          Panel de Administración
        </h1>

        <!-- Error Message -->
        @if (error) {
        <div role="alert" class="alert alert-error">
          <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>{{ error }}</span>
          <button class="btn btn-sm btn-ghost" (click)="clearError()">✕</button>
        </div>
        }

        <form
          class="space-y-4 md:space-y-6"
          [formGroup]="loginForm"
          (ngSubmit)="onSubmit()"
        >
          <div>
            <label
              for="email"
              class="block mb-2 text-sm font-medium text-base-content"
              >Email</label
            >
            <input
              type="email"
              name="email"
              id="email"
              class="input input-bordered w-full"
              [class.input-error]="isFieldInvalid('email')"
              placeholder="admin&#64;electromix.com"
              formControlName="email"
              autocomplete="email"
            />
            @if (isFieldInvalid('email')) {
            <p class="mt-2 text-sm text-error">
              {{ getFieldError("email") }}
            </p>
            }
          </div>

          <div>
            <label
              for="password"
              class="block mb-2 text-sm font-medium text-base-content"
              >Contraseña</label
            >
            <div class="relative">
              <input
                [type]="showPassword() ? 'text' : 'password'"
                name="password"
                id="password"
                formControlName="password"
                placeholder="••••••••"
                class="input input-bordered w-full pr-10"
                [class.input-error]="isFieldInvalid('password')"
                autocomplete="current-password"
              />
              <button
                type="button"
                class="absolute inset-y-0 right-0 pr-3 flex items-center text-base-content/40 hover:text-base-content/70 transition-colors"
                (click)="togglePasswordVisibility()"
              >
                @if (showPassword()) {
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21"
                  />
                </svg>
                } @else {
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
                }
              </button>
            </div>
            @if (isFieldInvalid('password')) {
            <p class="mt-2 text-sm text-error">
              {{ getFieldError("password") }}
            </p>
            }
          </div>

          <button
            type="submit"
            [disabled]="loading"
            class="btn btn-primary w-full"
          >
            @if (loading) {
            <span class="loading loading-spinner"></span>
            Iniciando sesión...
            } @else {
            Iniciar Sesión
            }
          </button>
        </form>

        <div class="mt-4 text-center">
          <p class="text-sm text-base-content/50">
            Panel de administración de Electromix
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
