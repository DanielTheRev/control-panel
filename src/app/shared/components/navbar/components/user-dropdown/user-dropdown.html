<!-- 2. USER DROPDOWN (NUEVO) -->
<button type="button" [matMenuTriggerFor]="userMenu"
  class="flex items-center gap-2 p-1 pl-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-all duration-200 border border-transparent hover:border-slate-200 dark:hover:border-slate-700">
  <div class="text-right hidden md:block">
    <p class="text-xs font-bold text-slate-700 dark:text-slate-200 leading-none mb-0.5">
      {{ user?.name }}
    </p>
    <p class="text-[10px] text-slate-400 font-medium leading-none">
      {{ user?.email }}
    </p>
  </div>

  <!-- Foto de Perfil con fallback a inicial -->
  <div
    class="w-8 h-8 rounded-md overflow-hidden bg-blue-100 flex items-center justify-center border border-blue-200 dark:border-blue-900">
    @if (user?.profilePhoto) {
    <img [src]="user?.profilePhoto" class="w-full h-full object-cover" />
    } @else {
    <span class="text-xs font-black text-blue-600">{{
      user?.name?.charAt(0)
      }}</span>
    }
  </div>
</button>

<!-- MENU DE USUARIO (Angular Material) -->
<mat-menu #userMenu="matMenu" xPosition="before" class="minimal-dropdown-panel">
  <div
    class="w-56 flex flex-col bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-2xl">
    <!-- User Info Header -->
    <div class="p-4 bg-slate-50/50 dark:bg-slate-800/30 border-b border-slate-100 dark:border-slate-800">
      <p class="text-sm font-bold text-slate-700 dark:text-white truncate">
        {{ user?.name }}
      </p>
      <p class="text-xs text-slate-400 truncate mb-2">{{ user?.email }}</p>
      <span
        class="px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-tighter bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300">
        {{ user?.role }}
      </span>
    </div>

    <!-- Section 1 -->
    <div class="py-1">
      <button mat-menu-item class="flex! items-center! h-10! group">
        <mat-icon class="material-icons mr-2 text-slate-400 group-hover:text-blue-500">person</mat-icon>
        <span
          class="text-sm font-medium text-slate-600 dark:text-slate-300 group-hover:text-slate-900 dark:group-hover:text-white">Mi
          Perfil</span>
      </button>
      <button mat-menu-item class="flex! items-center! h-10! group">
        <mat-icon class="material-icons mr-2 text-slate-400 group-hover:text-blue-500">settings</mat-icon>
        <span
          class="text-sm font-medium text-slate-600 dark:text-slate-300 group-hover:text-slate-900 dark:group-hover:text-white">Ajustes</span>
      </button>
    </div>

    <mat-divider class="dark:border-slate-800"></mat-divider>

    <!-- Section 2 -->
    <div class="py-1">
      <button mat-menu-item class="flex! items-center! h-10! group">
        <mat-icon class="material-icons mr-2 text-slate-400 group-hover:text-red-500">favorite</mat-icon>
        <span class="text-sm font-medium text-slate-600 dark:text-slate-300">Mis Favoritos</span>
      </button>
      <button mat-menu-item class="flex! items-center! h-10! group">
        <mat-icon class="material-icons mr-2 text-slate-400 group-hover:text-amber-500">layers</mat-icon>
        <span class="text-sm font-medium text-slate-600 dark:text-slate-300">Colecciones</span>
      </button>
      <button mat-menu-item class="flex! items-center! h-10! group !bg-blue-50/30 dark:!bg-blue-900/10">
        <mat-icon class="material-icons mr-2 text-blue-600 dark:text-blue-400">rocket_launch</mat-icon>
        <span class="text-sm font-bold text-blue-700 dark:text-blue-400">Versión Pro</span>
        <mat-icon class="material-icons ml-auto mr-0 text-[14px] text-blue-400">chevron_right</mat-icon>
      </button>
    </div>

    <mat-divider class="dark:border-slate-800"></mat-divider>

    <!-- Sign Out -->
    <div class="p-1">
      <button (click)="logout()"
        class="flex! items-center! h-10! group hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg">
        <mat-icon class="material-icons mr-2 text-slate-400 group-hover:text-red-600">logout</mat-icon>
        <span
          class="text-sm font-bold text-slate-600 dark:text-slate-300 group-hover:text-red-700 dark:group-hover:text-red-400">Cerrar
          Sesión</span>
      </button>
    </div>
  </div>
</mat-menu>
