<header class="flex items-center justify-between px-6 py-3">
  <div class="flex items-center gap-4">
    <h2 class="text-lg font-semibold tracking-tight text-base-content">Dashboard</h2>
  </div>

  <div class="flex items-center gap-3">
    <!-- WebSocket Status -->
    <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-medium bg-base-200 border border-base-300">
      <div class="w-2 h-2 rounded-full"
        [class.bg-emerald-500]="wsConnected"
        [class.bg-red-500]="!wsConnected">
      </div>
      <span class="text-base-content/50">
        {{ wsConnected ? 'Online' : 'Offline' }}
      </span>
    </div>

    <!-- Theme Toggle -->
    <button class="btn btn-ghost btn-sm btn-square" (click)="toggleTheme()"
      [title]="isDark ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
      @if (isDark) {
      <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
      </svg>
      } @else {
      <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
      </svg>
      }
    </button>

    <!-- Notifications -->
    <app-notifications />

    <!-- User Dropdown -->
    <app-user-dropdown />
  </div>
</header>
