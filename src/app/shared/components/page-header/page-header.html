<div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4 border-b border-base-300 p-6 {{ withMB() ? 'mb-2' : '' }}">
  <div class="flex-1">
    <h1 class="m-0 text-xl font-bold text-base-content tracking-wide">
      {{ title() }}
    </h1>

    @if (subtitle()) {
    <p class="text-sm text-base-content/50 mt-1">
      {{ subtitle() }}
    </p>
    }
  </div>

  <div class="flex items-center gap-3">
    <ng-content select="[actions]"></ng-content>
  </div>
</div>

<ng-content select="[sub-menu]"></ng-content>
